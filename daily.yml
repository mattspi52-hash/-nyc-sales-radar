name: nyc-sales-radar

on:
  schedule:
    - cron: '0 12 * * 1-5'      # ~8am ET weekdays (12:00 UTC; drifts 1h w/ DST)
  workflow_dispatch:            # lets you run it manually from the Actions tab

permissions:
  contents: write              # needed to commit the 'seen' state back

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run radar + email digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO:  ${{ secrets.EMAIL_TO }}
        run: python run_daily.py

      - name: Persist 'seen' state
        run: |
          if [[ -n "$(git status --porcelain seen_roles.json)" ]]; then
            git config user.name  "radar-bot"
            git config user.email "radar-bot@users.noreply.github.com"
            git add seen_roles.json
            git commit -m "update seen state [skip ci]"
            git push
          else
            echo "no state change"
          fi
